# Scoreboard Plugin Configuration — Turf Wars

update-interval-ticks: 20
default-scoreboard-type: LOBBY

scoreboards:
  lobby:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  Map: <aqua>—"
      - ""
      - "  Players: <aqua>{players}"
      - "  Rank: <aqua>{rank_name}"
      - ""
      - "  <gray>Waiting for players..."
      - ""
      - "{animation:Footer}"

  in_game:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  Map: <aqua>—"
      - ""
      - "  Players: <aqua>{players}"
      - ""
      - "{animation:Footer}"

  spectator:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  Map: <aqua>—"
      - ""
      - "  Players: <aqua>{players}"
      - ""
      - "{animation:Footer}"

  tw_waiting:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  Map: <aqua>{map}"
      - "  Players: <aqua>{player_count}"
      - "  Time: <aqua>{time_remaining}s"
      - ""
      - "  <gray>Waiting for players..."
      - ""
      - "{animation:Footer}"

  tw_build:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  Phase: <yellow>Build"
      - ""
      - "  Time Left: <aqua>{time_remaining}s"
      - ""
      - "  <blue>Blue Lines: <white>{blue_lines}"
      - "  <red>Red Lines: <white>{red_lines}"
      - ""
      - "{animation:Footer}"

  tw_combat:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  Phase: <red>Combat"
      - ""
      - "  Time Left: <aqua>{time_remaining}s"
      - ""
      - "  <blue>Blue Lines: <white>{blue_lines}"
      - "  <red>Red Lines: <white>{red_lines}"
      - ""
      - "{animation:Footer}"

  tw_peace:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  Phase: <green>Peace"
      - ""
      - "  Time Left: <aqua>{time_remaining}s"
      - ""
      - "  <blue>Blue Lines: <white>{blue_lines}"
      - "  <red>Red Lines: <white>{red_lines}"
      - ""
      - "{animation:Footer}"

  tw_suddendeath:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  Phase: <dark_red><bold>SUDDEN DEATH"
      - ""
      - "  <blue>Blue Lines: <white>{blue_lines}"
      - "  <red>Red Lines: <white>{red_lines}"
      - ""
      - "{animation:Footer}"

  tw_ended:
    title: "<gradient:#00D4FF:#00FFD4><bold>      PHAROGAMES      </bold></gradient>"
    lines:
      - ""
      - "  <gray>Match ended!"
      - ""
      - "  <blue>Blue Lines: <white>{blue_lines}"
      - "  <red>Red Lines: <white>{red_lines}"
      - ""
      - "{animation:Footer}"

animations:
  Footer:
    interval-ticks: 20
    frames:
      - "   <aqua>play.pharogames.net"
      - "   <dark_aqua>play.pharogames.net"
      - "   <white>play.pharogames.net"

tablist:
  enabled: true
  update-interval-ticks: 10
  header:
    - ""
    - "<gradient:#00D4FF:#00FFD4><bold>PharoGames</bold></gradient>"
    - ""
  footer:
    - ""
    - "{animation:Footer}"
    - ""
