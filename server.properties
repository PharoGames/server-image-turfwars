# Minecraft Server Properties - MicroBattles Server
# This file will be copied into the Docker image

# Server settings
server-port=25565
server-ip=
online-mode=false
white-list=false

# World settings
level-name=world
level-seed=
level-type=minecraft\:normal
generate-structures=false
spawn-monsters=false
spawn-animals=false
spawn-npcs=false
allow-nether=false
allow-end=false

# Performance
view-distance=10
simulation-distance=8
max-tick-time=60000

# Network
network-compression-threshold=256
max-world-size=29999984

# Gameplay
gamemode=survival
pvp=true
difficulty=normal
hardcore=false

# Other
motd=PharoGames MicroBattles
enable-command-block=false
enable-query=false
enable-rcon=false
enable-status=true
force-gamemode=true
