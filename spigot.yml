# This is the main configuration file for Spigot.
# As you can see, there's tons to configure. Some options may impact gameplay, so use
# with caution, and read the documentation.
# For a reference for any variable inside this file, check https://docs.papermc.io/paper/reference/spigot-configuration
#
# If you need help with the configuration or have any questions related to Spigot,
# join us in our Discord or check out our website https://papermc.io/
#
# 
# DO NOT EDIT THIS FILE WHILE THE SERVER IS RUNNING
#

settings:
  debug: false
  save-user-cache-on-stop-only: false
  sample-count: 12
  timeout-time: 60
  restart-on-crash: true
  restart-script: ./start.sh
  bungeecord: false
  netty-threads: 4
  filter-creative-items: true
  user-cache-size: 1000
  int-cache-limit: 1024
  moved-wrongly-threshold: 0.0625
  moved-too-quickly-multiplier: 10.0
  moved-too-quickly-threshold: 0.3
  log-villager-deaths: true
  log-named-deaths: true
  late-bind: false
  bungeecord-addresses: []
  player-sample: []
  user-cache-stats: true
  max-bulk-chunks: 10
  max-tick-time:
    tile: 50
    entity: 50
  item-dirty-ticks: 20




















