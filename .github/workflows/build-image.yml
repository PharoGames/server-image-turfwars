name: Build and Push Server Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: pharogames/${{ github.repository }}
  ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL || 'http://orchestrator.orchestrator.svc.cluster.local:3000' }}

jobs:
  build:
    runs-on: [self-hosted, amd64]
    permissions:
      contents: read
      packages: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          REPO_NAME=$(basename ${{ github.repository }})
          echo "IMAGE_NAME=pharogames/${REPO_NAME}" >> $GITHUB_ENV

      - name: Prepare buildx driver options
        id: buildx-opts
        run: |
          if [ -n "${HTTPS_PROXY:-}" ]; then
            {
              echo "driver_opts<<OPTS_EOF"
              echo "network=host"
              echo "env.HTTP_PROXY=${HTTP_PROXY}"
              echo "env.HTTPS_PROXY=${HTTPS_PROXY}"
              echo "OPTS_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "driver_opts<<OPTS_EOF"
              echo "network=host"
              echo "OPTS_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64
          driver-opts: ${{ steps.buildx-opts.outputs.driver_opts }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push platform-specific image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          build-args: |
            PURPUR_VERSION=1.21.11
            CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}
            AWS_REGION=auto
            AWS_ENDPOINT_URL=${{ secrets.AWS_ENDPOINT_URL }}
            PUBLIC_PLUGINS_BUCKET=pharogames-plugins
          secrets: |
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-v2
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-v2,mode=max

  post-deploy:
    needs: build
    if: success()
    runs-on: [self-hosted, amd64]
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_CONFIG: /tmp/.docker-${{ github.run_id }}-post

    steps:
      - name: Set lowercase image name
        run: |
          REPO_NAME=$(basename ${{ github.repository }})
          echo "IMAGE_NAME=pharogames/${REPO_NAME}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get merged image digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect --raw ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Image digest: ${DIGEST}"

      - name: Update image manifest in infrastructure repo
        continue-on-error: true
        run: |
          echo "Updating image manifest in infrastructure repo..."

          APP_TOKEN="${{ steps.app-token.outputs.token }}"
          INFRA_REPO="PharoGames/infrastructure"
          
          REPO_NAME=$(basename ${{ github.repository }})
          SERVER_TYPE=${REPO_NAME#server-image-}
          
          MANIFEST_PATH="kubernetes/${SERVER_TYPE}/image-manifest.yaml"
          IMAGE_DIGEST="${{ steps.digest.outputs.digest }}"
          FULL_IMAGE="docker.io/pharogames/${REPO_NAME}@${IMAGE_DIGEST}"

          INFRA_DIR=$(mktemp -d)
          INFRA_REPO_URL="https://x-access-token:${APP_TOKEN}@github.com/${INFRA_REPO}.git"
          git clone --depth 1 --branch main "$INFRA_REPO_URL" "$INFRA_DIR" || {
            echo "Warning: Failed to clone infrastructure repo"
            rm -rf "$INFRA_DIR"
            exit 0
          }

          cd "$INFRA_DIR"

          if [ -f "$MANIFEST_PATH" ]; then
            if grep -q "^  image:" "$MANIFEST_PATH"; then
              sed -i "s|^  image:.*|  image: ${FULL_IMAGE}|" "$MANIFEST_PATH"
            elif grep -q "^image:" "$MANIFEST_PATH"; then
              sed -i "s|^image:.*|image: ${FULL_IMAGE}|" "$MANIFEST_PATH"
            else
              echo "Warning: image field not found in manifest"
            fi

            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add "$MANIFEST_PATH"
            if git diff --staged --quiet; then
              echo "No changes to commit (image manifest already up to date)"
            else
              git commit -m "chore: update ${SERVER_TYPE} image to ${IMAGE_DIGEST}"
              git push origin main || echo "Failed to push (may require manual update)"
              echo "Image manifest updated successfully"
            fi
          else
            echo "Warning: Image manifest not found at $MANIFEST_PATH"
          fi

          rm -rf "$INFRA_DIR"

      - name: Notify Orchestrator of new image
        continue-on-error: true
        run: |
          echo "Notifying orchestrator of new image..."

          IMAGE_TAG="latest"

          echo "Using orchestrator URL: ${{ env.ORCHESTRATOR_URL }}"
          echo "Image tag: $IMAGE_TAG"
          
          REPO_NAME=$(basename ${{ github.repository }})
          SERVER_TYPE=${REPO_NAME#server-image-}

          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.ORCHESTRATOR_API_TOKEN }}" \
            "${{ env.ORCHESTRATOR_URL }}/updateImage?serverType=${SERVER_TYPE}&tag=$IMAGE_TAG" && \
            echo "Successfully notified orchestrator" || \
            echo "Warning: Failed to notify orchestrator (will be detected via image manifest polling)"
