# This is the main configuration file for Bukkit.
# As you can see, there's a lot to configure. Some options may impact gameplay, so use
# with caution, and read the documentation.
# For a reference for any variable inside this file, check https://docs.papermc.io/paper/reference/bukkit-configuration
#
# If you need help with the configuration or have any questions related to Bukkit,
# join us in our Discord or check out our website https://papermc.io/
#
# 
# DO NOT EDIT THIS FILE WHILE THE SERVER IS RUNNING
#

settings:
  allow-end: true
  warn-on-overload: true
  permissions-file: permissions.yml
  update-folder: update
  plugin-profiling: false
  connection-throttle: 4000
  query-plugins: true
  deprecated-verbose: default
  shutdown-message: Server closed
  minimum-api: none
  use-map-color-cache: true
spawn-limits:
  monsters: 70
  animals: 10
  water-animals: 5
  water-ambient: 20
  water-underground-creature: 5
  axolotls: 5
  ambient: 15
chunk-gc:
  period-in-ticks: 600
ticks-per:
  animal-spawns: 400
  monster-spawns: 1
  water-spawns: 1
  water-ambient-spawns: 1
  water-underground-creature-spawns: 1
  axolotl-spawns: 1
  ambient-spawns: 1
  autosave: -1
aliases: now-in-commands.yml






















